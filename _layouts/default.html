<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ================================================================== -->
  <!-- Labhole — Default Layout                                           -->
  <!-- A clean, single-column layout for a science-ethics advocacy site.  -->
  <!-- ================================================================== -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">

  <title>{{ site.title }}</title>

  <!-- Custom stylesheet -->
  <link rel="stylesheet" href="{{ "/css/style.css" | relative_url }}">
</head>

<body>
  <!-- ========================= SKIP NAVIGATION ========================= -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- =============================== NAV ================================ -->
  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <a class="nav-btn" href="{{ "/" | relative_url }}">Home</a>
    <a class="nav-btn" href="{{ "/evaluation/" | relative_url }}">Evaluation</a>
  </nav>

  <!-- ============================== MAIN ================================ -->
  <main class="site-main" id="main-content" role="main">
    <article class="page-content">
      {{ content }}
    </article>
  </main>

</body>
</html>
