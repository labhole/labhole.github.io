<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ================================================================== -->
  <!-- Labhole — Default Layout                                           -->
  <!-- A clean, single-column layout for a science-ethics advocacy site.  -->
  <!-- ================================================================== -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">

  <title>{{ site.title }}</title>

  <!-- Google Fonts — Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap">

  <!-- Custom stylesheet -->
  <link rel="stylesheet" href="{{ "/css/style.css" | relative_url }}">
</head>

<body>
  <!-- ========================= SKIP NAVIGATION ========================= -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- ============================== MAIN ================================ -->
  <main class="site-main" id="main-content" role="main">
    <article class="page-content">
      {{ content }}
    </article>
  </main>

</body>
</html>
