<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ================================================================== -->
  <!-- Labhole — Default Layout                                           -->
  <!-- A clean, single-column layout for a science-ethics advocacy site.  -->
  <!-- ================================================================== -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">

  <title>{{ site.title }}</title>

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="{{ "/apple-touch-icon.png" | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "/favicon-32x32.png" | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ "/favicon-16x16.png" | relative_url }}">
  <link rel="manifest" href="{{ "/site.webmanifest" | relative_url }}">
  <meta name="theme-color" content="#211103">

  <!-- Custom stylesheet -->
  <link rel="stylesheet" href="{{ "/css/style.css" | relative_url }}">
</head>

<body>
  <!-- ========================= SKIP NAVIGATION ========================= -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- =============================== NAV ================================ -->
  <nav class="site-nav" aria-label="Main navigation">
    <ul class="nav-list">
      <li><a class="nav-btn" href="{{ "/" | relative_url }}" {% if page.url == "/" %}aria-current="page"{% endif %}>Home</a></li>
      <li><a class="nav-btn" href="{{ "/mindset/" | relative_url }}" {% if page.url == "/mindset/" %}aria-current="page"{% endif %}>Mindset</a></li>
      <li><a class="nav-btn" href="{{ "/letter/" | relative_url }}" {% if page.url == "/letter/" %}aria-current="page"{% endif %}>Open Letter</a></li>
      <li><a class="nav-btn" href="{{ "/aspiring_researchers/" | relative_url }}" {% if page.url == "/aspiring_researchers/" %}aria-current="page"{% endif %}>Aspiring Researchers</a></li>
      <li><a class="nav-btn" href="{{ "/support/" | relative_url }}" {% if page.url == "/support/" %}aria-current="page"{% endif %}>Show Your Support</a></li>
    </ul>
  </nav>

  <!-- ============================== MAIN ================================ -->
  <main class="site-main" id="main-content" role="main">
    <article class="page-content">
      {{ content }}
    </article>
  </main>

</body>
</html>
